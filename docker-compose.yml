version: '3.8'

services:
  # PostgreSQL for Order Service
  postgres_order:
    image: postgres:15-alpine
    container_name: postgres_order
    environment:
      POSTGRES_DB: order_service_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for Customer Service
  postgres_customer:
    image: postgres:15-alpine
    container_name: postgres_customer
    environment:
      POSTGRES_DB: customer_service_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_customer_data:/var/lib/postgresql/data
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ with Management Plugin
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Order Service
  order_service:
    build:
      context: ./order_service
      dockerfile: Dockerfile
    container_name: order_service
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      DB_HOST: postgres_order
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: order_service_development
      CUSTOMER_SERVICE_URL: http://customer_service:3000
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ORDER_EVENTS_EXCHANGE: order.events
    ports:
      - "3001:3000"
    volumes:
      - ./order_service:/app
      - order_bundle:/usr/local/bundle
    depends_on:
      postgres_order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Customer Service
  customer_service:
    build:
      context: ./customer_service
      dockerfile: Dockerfile
    container_name: customer_service
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      DB_HOST: postgres_customer
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: customer_service_development
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      ORDER_EVENTS_EXCHANGE: order.events
      ORDER_CREATED_QUEUE: customer_service.order_created
      DLX_EXCHANGE: dlx.order.events
      DLQ_NAME: customer_service.order_created.dlq
    ports:
      - "3002:3000"
    volumes:
      - ./customer_service:/app
      - customer_bundle:/usr/local/bundle
    depends_on:
      postgres_customer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - microservices_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  microservices_network:
    driver: bridge

volumes:
  postgres_order_data:
  postgres_customer_data:
  rabbitmq_data:
  order_bundle:
  customer_bundle:
